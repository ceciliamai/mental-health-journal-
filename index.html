<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warm Mood Journal</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial Rounded MT Bold,sans-serif;}
        body{background:#fff9d9;min-height:100vh;padding:25px;}
        .wrap{max-width:750px;margin:0 auto;}
        h1{text-align:center;color:#c9982b;margin-bottom:8px;font-size:28px;}
        .tip{text-align:center;color:#b88a20;margin-bottom:30px;}
        .user-box{background:#fff6cc;padding:25px;border-radius:20px;margin-bottom:25px;box-shadow:0 4px 12px #f0e0a8;}
        .main-box{background:#fff6cc;padding:25px;border-radius:20px;box-shadow:0 4px 12px #f0e0a8;display:none;}
        .hide{display:none;}
        label{display:block;margin:12px 0 6px;color:#a07618;font-weight:600;}
        input,textarea{width:100%;padding:14px;border:2px solid #f9e29c;border-radius:15px;background:#fffdf0;font-size:15px;outline:none;}
        textarea{min-height:140px;resize:none;}
        .mood-group{display:flex;flex-wrap:wrap;gap:10px;margin:15px 0;}
        .mood{padding:9px 16px;border-radius:30px;border:none;background:#ffe89e;color:#855f15;cursor:pointer;transition:0.2s;}
        .mood.active{background:#ffc845;color:#fff;}
        .btn{width:100%;padding:15px;margin-top:15px;border-radius:15px;border:none;background:#ffc845;color:#704e10;font-size:16px;font-weight:bold;cursor:pointer;}
        .btn:hover{background:#ffb726;}
        .list{margin-top:30px;display:flex;flex-direction:column;gap:18px;}
        .item{background:#fff6cc;padding:20px;border-radius:18px;box-shadow:0 3px 8px #f0e0a8;position:relative;}
        .top{display:flex;justify-content:space-between;margin-bottom:10px;}
        .time{color:#b0821c;font-size:13px;}
        .tag{background:#ffe89e;padding:4px 12px;border-radius:20px;font-size:13px;color:#855f15;}
        .text{color:#6b4c12;line-height:1.7;}
        .del{position:absolute;top:15px;right:15px;border:none;background:none;color:#d85050;font-size:18px;cursor:pointer;}
    </style>
</head>
<body>
<div class="wrap">
    <h1>Soft Warm Mood Journal</h1>
    <p class="tip">Record your mood & send copy to your email 💛</p>

    <!-- First page: name + email -->
    <div class="user-box" id="userPage">
        <label>Your Name</label>
        <input type="text" id="nameInp" placeholder="Enter your name">
        <label>Your Email</label>
        <input type="email" id="emailInp" placeholder="your@email.com">
        <button class="btn" onclick="enterJournal()">Enter My Journal</button>
    </div>

    <!-- Main journal page -->
    <div class="main-box" id="mainPage">
        <label>How do you feel today?</label>
        <div class="mood-group">
            <button class="mood" data-m="Happy">Happy</button>
            <button class="mood" data-m="Calm">Calm</button>
            <button class="mood" data-m="Anxious">Anxious</button>
            <button class="mood" data-m="Sad">Sad</button>
            <button class="mood" data-m="Stressed">Stressed</button>
            <button class="mood" data-m="Tired">Tired</button>
        </div>
        <label>Write your feelings down</label>
        <textarea id="noteInp" placeholder="Write everything you want to say..."></textarea>
        <button class="btn" onclick="saveNote()">Save & Send To Email</button>
    </div>

    <!-- All saved entries -->
    <div class="list" id="noteList"></div>
</div>

<script>
let selectMood = "Happy";
let userName = "";
let userMail = "";

// load saved info
window.onload=function(){
    let n=localStorage.getItem("jname");
    let e=localStorage.getItem("jmail");
    if(n&&e){
        userName=n;userMail=e;
        document.getElementById("userPage").classList.add("hide");
        document.getElementById("mainPage").style.display="block";
    }
    loadNotes();
}

// choose mood
document.querySelectorAll(".mood").forEach(b=>{
    b.onclick=function(){
        document.querySelectorAll(".mood").forEach(x=>x.classList.remove("active"));
        this.classList.add("active");
        selectMood=this.dataset.m;
    }
})

// enter journal
function enterJournal(){
    let n=document.getElementById("nameInp").value.trim();
    let e=document.getElementById("emailInp").value.trim();
    if(!n||!e)return alert("Please fill name and email");
    userName=n;userMail=e;
    localStorage.setItem("jname",n);
    localStorage.setItem("jmail",e);
    document.getElementById("userPage").classList.add("hide");
    document.getElementById("mainPage").style.display="block";
}

// save note + email send
function saveNote(){
    let txt=document.getElementById("noteInp").value.trim();
    if(!txt)return alert("Please write something~");
    let now=new Date().toLocaleString();
    let arr=JSON.parse(localStorage.getItem("jnotes"))||[];
    arr.unshift({id:Date.now(),time:now,mood:selectMood,content:txt});
    localStorage.setItem("jnotes",JSON.stringify(arr));
    document.getElementById("noteInp").value="";
    loadNotes();

    // auto open email send
    let sub=`${userName}'s Mood Journal Record`;
    let body=`Hello ${userName}\n\nTime:${now}\nMood:${selectMood}\nContent:\n${txt}`;
    window.location.href=`mailto:${userMail}?subject=${encodeURIComponent(sub)}&body=${encodeURIComponent(body)}`;
}

// show all notes
function loadNotes(){
    let arr=JSON.parse(localStorage.getItem("jnotes"))||[];
    let box=document.getElementById("noteList");
    box.innerHTML="";
    arr.forEach(item=>{
        box.innerHTML+=`
        <div class="item">
            <div class="top">
                <span class="time">${item.time}</span>
                <span class="tag">${item.mood}</span>
            </div>
            <p class="text">${item.content}</p>
            <button class="del" onclick="delNote(${item.id})">×</button>
        </div>
        `
    })
}

// delete note
function delNote(id){
    let arr=JSON.parse(localStorage.getItem("jnotes"))||[];
    arr=arr.filter(x=>x.id!=id);
    localStorage.setItem("jnotes",JSON.stringify(arr));
    loadNotes();
}
</script>
</body>
</html>
